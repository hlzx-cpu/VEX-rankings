name: Update VURC Rankings

on:
  workflow_dispatch:          # 手动触发
  schedule:
    - cron: '0 */6 * * *'     # 每 6 小时自动触发

permissions:
  contents: write

concurrency:
  group: update-vurc-rankings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. 拉取仓库代码
      - uses: actions/checkout@v4

      # ── 2. 配置 Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. 安装依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. 抓取数据 & 生成 HTML
      - name: Fetch data and generate HTML
        env:
          EVENTS_VEX_REQUEST_INTERVAL: "1.0"
        run: python data_fetcher.py

      # ── 5. 提交并推送（无变动时优雅跳过）
      - name: Commit and push if changed
        run: |
          git config user.name "VURC-Bot"
          git config user.email "bot@github.com"
          git add rankings/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "auto: update rankings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
